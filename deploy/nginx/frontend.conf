# Astro storefront — /etc/nginx/sites-available/maxmac-frontend
#
# Install:
#   sudo cp deploy/nginx/frontend.conf /etc/nginx/sites-available/maxmac-frontend
#   sudo ln -sf /etc/nginx/sites-available/maxmac-frontend /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d maxmacsafaris.com -d www.maxmacsafaris.com
#
# Replace APP_ROOT, FRONTEND_DOMAIN, PHP_FPM_SOCK before enabling.

server {
    listen 80;
    listen [::]:80;
    server_name FRONTEND_DOMAIN FRONTEND_DOMAIN_WWW;

    root APP_ROOT/frontend/dist;
    index index.html;

    # Currency geo detection (same path as Cloudflare Pages function)
    location = /api/geo {
        include snippets/fastcgi-php.conf;
        fastcgi_pass PHP_FPM_SOCK;
        fastcgi_param SCRIPT_FILENAME APP_ROOT/deploy/api/geo.php;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
