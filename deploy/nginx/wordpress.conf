# WordPress + WP Travel Engine — /etc/nginx/sites-available/maxmac-wp
#
# Install:
#   sudo cp deploy/nginx/wordpress.conf /etc/nginx/sites-available/maxmac-wp
#   sudo ln -sf /etc/nginx/sites-available/maxmac-wp /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d wp.maxmacsafaris.com

server {
    listen 80;
    listen [::]:80;
    server_name WP_DOMAIN;

    root APP_ROOT/wordpress-maxmac;
    index index.php;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass PHP_FPM_SOCK;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
